version: '3.8'

services:
  docmind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docmind
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - GLM_MODEL=${GLM_MODEL:-glm-4}
      - GLM_TEMPERATURE=${GLM_TEMPERATURE:-0.7}
      - GLM_MAX_TOKENS=${GLM_MAX_TOKENS:-4096}
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=${DEBUG:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - docmind-network

networks:
  docmind-network:
    driver: bridge
